    description: >-
      The GitLab Broadcast Messages API allows administrators to create and
      manage broadcast messages that appear as banners across all GitLab pages.
      These messages are used to communicate announcements, maintenance notices,
      and other important information to all users of a GitLab instance.
  - aid: gitlab:apiv4bulk-imports
    name: GitLab Bulk Imports API
    tags:
