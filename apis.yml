    description: >-
      The GitLab Applications API allows you to manage OAuth applications
      registered in GitLab. You can create, list, and delete OAuth applications
      that enable third-party services to access GitLab resources on behalf of
      users using the OAuth 2.0 protocol.
  - aid: gitlab:apiv4avatar
    name: GitLab Avatar API
    tags:
