        type: Documentation
    description: >-
      The GitLab Projects API provides programmatic access to GitLab projects,
      enabling you to create, list, update, and delete projects. It supports
      managing project settings, members, forks, stars, and other project-level
      resources across GitLab.com and self-managed instances.
  - aid: gitlab:apiv4admin
    name: GitLab Admin API
    tags:
      - Admin
