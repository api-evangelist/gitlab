      - url: asyncapi/gitlab-webhooks-asyncapi.yml
        type: AsyncAPI
      - url: https://docs.gitlab.com/user/project/integrations/webhooks.html
        type: Documentation
      - url: https://docs.gitlab.com/api/project_webhooks/
        type: Reference
    description: >-
      GitLab Webhooks allow you to receive real-time HTTP POST notifications
      when events occur in GitLab projects or groups. Webhooks can be configured
      to trigger on events such as push events, merge requests, issues, comments,
      and pipeline status changes, enabling integrations with external systems.
