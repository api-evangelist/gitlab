    description: >-
      The GitLab Admin API provides administrative endpoints for managing a
      GitLab instance. It includes operations for managing runners, CI/CD
      variables, Sidekiq queues, and other instance-level administrative tasks
      that require administrator privileges.
  - aid: gitlab:apiv4applications
    name: GitLab Applications API
