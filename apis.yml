      The GitLab Version API returns version and revision information for the
      GitLab instance. This endpoint is useful for verifying what version of
      GitLab is running and for checking compatibility with specific API
      features before making requests.
  - aid: gitlab:gitlab-rest-api
    name: GitLab REST API
    tags:
      - REST
      - DevOps
      - Integration
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://gitlab.com/api/v4
    humanURL: https://docs.gitlab.com/api/rest/
    overlays: []
    properties:
      - url: openapi/gitlab-openapi-original.yml
        type: OpenAPI
      - url: https://docs.gitlab.com/api/rest/
        type: Documentation
      - url: https://docs.gitlab.com/api/rest/authentication/
        type: Authentication
      - url: https://docs.gitlab.com/api/rest/third_party_clients/
