      - url: https://docs.gitlab.com/api/avatar/
        type: Documentation
    description: >-
      The GitLab Avatar API allows you to retrieve avatar images for users and
      groups. It returns avatar URLs based on user email addresses, enabling
      applications to display profile images for GitLab users without requiring
      authentication.
  - aid: gitlab:apiv4broadcast-messages
    name: GitLab Broadcast Messages API
    tags:
