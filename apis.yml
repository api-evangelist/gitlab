    description: >-
      The GitLab REST API provides programmatic access to GitLab resources,
      enabling you to build integrations, automate repetitive tasks, and extract
      data for custom reports. The API supports projects, groups, issues, merge
      requests, CI/CD pipelines, and many other GitLab features through standard
      HTTP methods and JSON responses.
  - aid: gitlab:gitlab-oauth2-api
    name: GitLab OAuth 2.0 API
    tags:
      - OAuth
      - Authentication
      - Authorization
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://gitlab.com
    humanURL: https://docs.gitlab.com/api/oauth2/
    overlays: []
    properties:
      - url: openapi/gitlab-oauth2-openapi.yml
        type: OpenAPI
      - url: https://docs.gitlab.com/api/oauth2/
        type: Documentation
      - url: https://docs.gitlab.com/integration/oauth_provider/
        type: Authentication
    description: >-
      The GitLab OAuth 2.0 API enables third-party services to access GitLab
      resources on behalf of users using the OAuth 2.0 protocol. It supports
      authorization code with PKCE, device authorization grant, and resource
      owner password credentials flows, allowing secure delegation of access to
      GitLab resources.
  - aid: gitlab:gitlab-webhooks
    name: GitLab Webhooks
    tags:
      - Webhooks
      - Events
      - Integrations
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://gitlab.com/api/v4
    humanURL: https://docs.gitlab.com/user/project/integrations/webhooks.html
    overlays: []
