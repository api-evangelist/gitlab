      The GitLab Bulk Imports API enables migration of groups and projects
      between GitLab instances. It provides endpoints for initiating bulk import
      operations and tracking their progress, facilitating large-scale data
      migrations between GitLab environments.
  - aid: gitlab:apiv4application
